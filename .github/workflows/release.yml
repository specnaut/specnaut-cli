name: release

on:
  push:
    tags:
      - "v*"

# No top-level permissions — each job declares its own minimal block.
# `security-preflight` is read-only on three security endpoints; `build`
# keeps `contents: write` for the actual release publish + tap bump.

jobs:
  # Hybrid security gate (#188's sibling): checks GitHub-side alert state
  # before we let the release build proceed. Critical alerts block the
  # release; high/medium surface as a workflow summary the local /release
  # session reads during step 9 of the release skill, then dispatches the
  # security-auditor agent for triage. Low alerts are logged silently.
  #
  # The release tag is already pushed at this point; failing here is the
  # safest possible failure mode — no GitHub Release object is created,
  # so users on the previous version stay on the previous version (no
  # broken binary reaches them via `specnaut self-update` or the install
  # script). Re-run the workflow after dismissing the alert; the same tag
  # rebuilds cleanly because the commit is unchanged.
  security-preflight:
    runs-on: ubuntu-latest
    permissions:
      security-events: read # secret-scanning + code-scanning alert reads
      contents: read # dependabot alerts (separate permission family)
    # Private security-advisories (state=triage,draft) cannot be read via
    # GITHUB_TOKEN — `repository-advisories` is a fine-grained PAT scope,
    # not a workflow permissions key, and adding it here silently fails
    # the workflow parse (zero jobs, 0s run, conclusion=failure). The
    # advisory query below 404s silently and yields 0; if pending
    # advisories must gate releases, wire a dedicated PAT secret and
    # override GH_TOKEN for that step only.
    steps:
      - name: Query open security alerts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # `gh api` writes 4xx error JSON to STDOUT (not stderr), so a naive
          # `2>/dev/null || echo 0` lets non-numeric blobs leak into shell
          # arithmetic and crashes the job (line "$((dep_critical + ...))"
          # fails with "syntax error: operand expected"). Wrap every count
          # through a coercer that rejects anything that isn't pure digits.
          # Permission gaps surface as 0 here and downstream — a degraded
          # but non-blocking signal — and a workflow ::warning is emitted
          # so the local /release session can investigate.
          missing_perms=()
          fetch_count() {
            local label="$1" url="$2" jq_filter="$3"
            local out
            out=$(gh api "$url" --jq "$jq_filter" 2>/dev/null || true)
            if [[ "$out" =~ ^[0-9]+$ ]]; then
              printf '%s' "$out"
            else
              missing_perms+=("$label")
              printf '0'
            fi
          }

          # 1. Secret scanning — pattern-based credential leak detection
          secret_open=$(fetch_count "secret_scanning" \
            "repos/$REPO/secret-scanning/alerts?state=open&per_page=100" \
            '[.[] | {number, secret_type_display_name, html_url}] | length')

          # 2. Dependabot — vulnerable dependencies (severity-aware)
          dep_critical=$(fetch_count "dependabot/critical" \
            "repos/$REPO/dependabot/alerts?state=open&per_page=100" \
            '[.[] | select(.security_advisory.severity=="critical")] | length')
          dep_high=$(fetch_count "dependabot/high" \
            "repos/$REPO/dependabot/alerts?state=open&per_page=100" \
            '[.[] | select(.security_advisory.severity=="high")] | length')
          dep_medium=$(fetch_count "dependabot/medium" \
            "repos/$REPO/dependabot/alerts?state=open&per_page=100" \
            '[.[] | select(.security_advisory.severity=="medium")] | length')

          # 3. Private vulnerability reports — externally-submitted advisories.
          # `repository-advisories` is a fine-grained PAT scope, NOT a workflow
          # permissions key, so this returns 0 with GITHUB_TOKEN. Wire a
          # dedicated PAT secret if pending advisories must hard-gate releases.
          adv_pending=$(fetch_count "private_advisories" \
            "repos/$REPO/security-advisories?state=triage,draft&per_page=100" \
            '[.[] | {number, summary, severity, html_url}] | length')

          # 4. Code scanning (CodeQL — only counts when code scanning is enabled).
          code_critical=$(fetch_count "code_scanning/critical" \
            "repos/$REPO/code-scanning/alerts?state=open&per_page=100" \
            '[.[] | select(.rule.security_severity_level=="critical")] | length')
          code_high=$(fetch_count "code_scanning/high" \
            "repos/$REPO/code-scanning/alerts?state=open&per_page=100" \
            '[.[] | select(.rule.security_severity_level=="high")] | length')

          # Decision tree:
          #   ANY critical (dep or code) → fail the release.
          #   Secret-scanning open       → fail (every match is treated as P0
          #                                regardless of "severity" — credentials
          #                                in source are always release-blocking).
          #   Pending advisory in triage → fail (a researcher is waiting; ship
          #                                a release without acknowledging is bad
          #                                form).
          critical_total=$((dep_critical + code_critical))

          # Append a structured summary that the local /release session will
          # read at step 9 of the release skill — this is the agent triage
          # payload.
          {
            echo "## Security alert preflight"
            echo
            echo "| Source | Open count |"
            echo "| --- | --- |"
            echo "| Secret scanning | ${secret_open} |"
            echo "| Dependabot — critical | ${dep_critical} |"
            echo "| Dependabot — high | ${dep_high} |"
            echo "| Dependabot — medium | ${dep_medium} |"
            echo "| Code scanning — critical | ${code_critical} |"
            echo "| Code scanning — high | ${code_high} |"
            echo "| Pending private advisories | ${adv_pending} |"
            echo
            echo "Critical total (dep + code): **${critical_total}**"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$critical_total" -gt 0 ] || [ "$secret_open" -gt 0 ] || [ "$adv_pending" -gt 0 ]; then
            echo "::error::Security preflight blocked the release. Critical/secret/advisory counts are non-zero. Resolve via the Security tab, then re-run this workflow (the tag stays valid)."
            exit 1
          fi

          if [ "$dep_high" -gt 0 ] || [ "$code_high" -gt 0 ]; then
            echo "::warning::High-severity findings open: $dep_high dependabot + $code_high code-scanning. The release proceeds; dispatch the security-auditor agent locally to triage."
          fi

          if [ "${#missing_perms[@]}" -gt 0 ]; then
            echo "::warning::Security preflight had no GITHUB_TOKEN access to: ${missing_perms[*]} — those signals are reported as 0 (degraded mode, not a release block). Wire a dedicated PAT secret if any of these must hard-gate releases."
          fi

  build:
    needs: [security-preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # `scripts/gen-changelog.ts` calls `gh pr view <num> --json body`
      # to extract the `## Agent adoption` section from each feat: PR.
      # Two things are required for those calls to succeed in CI, and both
      # are now in place (#363):
      #   1. `pull-requests: read` below grants the token the scope.
      #   2. `env: GH_TOKEN: ${{ github.token }}` on the "Generate release
      #      notes" step actually places the token in the step env so `gh`
      #      is authenticated — a permission scope alone does NOT do this.
      # Earlier only (1) was applied, so `gh` ran unauthenticated and every
      # adoption fetch failed silently, shipping a body with no
      # `### Adoption guide` block (e.g. v1.6.0 / v1.13.0, amended manually
      # post-release). The step now also runs `--strict`, which fails the
      # build on any retrieval failure rather than publishing a partial guide.
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so `git describe` and `git log <prev>..HEAD`
          # can produce the changelog.
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Bundle templates
        run: deno task bundle
      - name: Plugin pre-flight (version lockstep + scaffold integrity)
        run: |
          set -euo pipefail
          # 1. plugin.json must be parseable JSON
          jq -e . plugin/.claude-plugin/plugin.json > /dev/null
          # 2. Plugin scaffold must contain at minimum the specnaut router skill
          # (catches an accidentally truncated plugin/ directory).
          test -f plugin/skills/specnaut/SKILL.md
          # 3. Hard fail if plugin.json version drifts from deno.json version.
          # The two are kept in lockstep by scripts/bump-version.ts.
          BIN_VERSION=$(jq -r .version deno.json)
          PLUGIN_VERSION=$(jq -r .version plugin/.claude-plugin/plugin.json)
          if [ "$BIN_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::plugin/.claude-plugin/plugin.json version ($PLUGIN_VERSION) does not match deno.json version ($BIN_VERSION). Re-run scripts/bump-version.ts."
            exit 1
          fi
          # 4. Hard fail if templates/manifest.json version drifts.
          # `TEMPLATES_VERSION` in src/templates_bundle.ts is generated
          # from this file; surfacing a stale value would mislabel the
          # binary's `--version` output.
          MANIFEST_VERSION=$(jq -r .version templates/manifest.json)
          if [ "$BIN_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::templates/manifest.json version ($MANIFEST_VERSION) does not match deno.json version ($BIN_VERSION). Re-run scripts/bump-version.ts."
            exit 1
          fi
          # 5. Hard fail if .codex-plugin/plugin.json version drifts.
          # The Codex marketplace fork is bumped lockstep with every
          # tag; drift here would publish a stale marketplace listing.
          CODEX_VERSION=$(jq -r .version .codex-plugin/plugin.json)
          if [ "$BIN_VERSION" != "$CODEX_VERSION" ]; then
            echo "::error::.codex-plugin/plugin.json version ($CODEX_VERSION) does not match deno.json version ($BIN_VERSION). Re-run scripts/bump-version.ts."
            exit 1
          fi
          # 6. Hard fail if .cursor-plugin/plugin.json version drifts.
          # Cursor users install directly from the repo; the manifest's
          # version must match the binary or the install would advertise
          # a stale version.
          CURSOR_VERSION=$(jq -r .version .cursor-plugin/plugin.json)
          if [ "$BIN_VERSION" != "$CURSOR_VERSION" ]; then
            echo "::error::.cursor-plugin/plugin.json version ($CURSOR_VERSION) does not match deno.json version ($BIN_VERSION). Re-run scripts/bump-version.ts."
            exit 1
          fi
          echo "✓ plugin manifests valid, scaffold present, versions $PLUGIN_VERSION/$MANIFEST_VERSION/$CODEX_VERSION/$CURSOR_VERSION match binary"
      - name: Cross-compile all targets
        run: deno run --allow-read --allow-write --allow-run --allow-env scripts/build.ts
      - name: Compute checksums
        run: |
          cd dist
          for f in specnaut-*; do
            shasum -a 256 "$f" > "$f.sha256"
          done
      - name: Generate release notes
        env:
          # Authenticate `gh pr view` so each feat PR's `## Agent adoption`
          # block is retrievable in CI — the root-cause fix for #363. Without
          # this the token's `pull-requests: read` scope is never placed in the
          # step env, so `gh` runs unauthenticated and every fetch fails.
          GH_TOKEN: ${{ github.token }}
        # `--strict` fails the build on any PR-body retrieval failure, before
        # the "Create release" step publishes — so an incomplete Adoption guide
        # can never ship silently. `--allow-env` is added for explicitness
        # (the token reaches `gh` via subprocess env inheritance regardless).
        run: deno run --allow-read --allow-write --allow-run --allow-env scripts/gen-changelog.ts --strict
      - name: Create release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/specnaut-macos-x64
            dist/specnaut-macos-x64.sha256
            dist/specnaut-macos-arm64
            dist/specnaut-macos-arm64.sha256
            dist/specnaut-linux-x64
            dist/specnaut-linux-x64.sha256
            dist/specnaut-linux-arm64
            dist/specnaut-linux-arm64.sha256
            dist/specnaut-windows-x64.exe
            dist/specnaut-windows-x64.exe.sha256
          body_path: dist/release-notes.md
      # The three publish steps below (tap / Codex / marketplace) each run
      # INDEPENDENTLY: gated only on the release having been created, never on
      # each other. A failure in one (e.g. an expired HOMEBREW_TAP_TOKEN) no
      # longer skips the others — the job still ends red so the failure is
      # noticed and fixed, but every distribution channel that *can* publish
      # does. (Hardening after v1.14.0, where a tap-token 403 skipped both
      # syncs — see specnaut-cli#402.)
      - name: Bump specnaut/homebrew-tap formula
        if: ${{ !cancelled() && steps.release.outcome == 'success' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          deno run --allow-read --allow-write --allow-run --allow-env \
            scripts/bump-tap-formula.ts
      - name: Sync to Codex marketplace fork (#277 / B1)
        if: ${{ !cancelled() && steps.release.outcome == 'success' }}
        # Mirrors the Specnaut plugin content into
        # `mkrlabs/plugins:plugins/specnaut/`. A human rebases that
        # fork's PR into upstream `openai/plugins` for the actual
        # marketplace publish. If CODEX_SYNC_TOKEN is unset, the
        # script emits a workflow ::warning and exits 0 — the release
        # itself ships unaffected (same pattern as HOMEBREW_TAP_TOKEN).
        env:
          GH_TOKEN: ${{ secrets.CODEX_SYNC_TOKEN }}
          SPECNAUT_VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading "v" from the tag ref for the version arg.
          export SPECNAUT_VERSION="${SPECNAUT_VERSION#v}"
          bash scripts/sync-to-codex-plugin.sh || rc=$?
          # Treat exit 2 (no token) as a non-blocking skip, same as
          # the Homebrew bump's behaviour.
          if [ "${rc:-0}" = "2" ]; then
            exit 0
          fi
          exit "${rc:-0}"
      - name: Sync to Specnaut marketplace catalog (#281 / B5)
        if: ${{ !cancelled() && steps.release.outcome == 'success' }}
        # Bumps `.claude-plugin/marketplace.json` in
        # `specnaut/specnaut-marketplace` (the shared marketplace
        # catalog serving both Claude Code AND Copilot CLI users via
        # `/plugin install specnaut@specnaut-marketplace` and
        # `copilot plugin install specnaut@specnaut-marketplace`).
        # Same skip-if-no-secret fail-safe as the Codex step.
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
          SPECNAUT_VERSION: ${{ github.ref_name }}
        run: |
          export SPECNAUT_VERSION="${SPECNAUT_VERSION#v}"
          bash scripts/sync-to-marketplace.sh || rc=$?
          if [ "${rc:-0}" = "2" ]; then
            exit 0
          fi
          exit "${rc:-0}"
