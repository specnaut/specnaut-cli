name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` and `git log <prev>..HEAD`
          # can produce the changelog.
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Bundle templates
        run: deno task bundle
      - name: Plugin pre-flight (version lockstep + scaffold integrity)
        run: |
          set -euo pipefail
          # 1. plugin.json must be parseable JSON
          jq -e . plugin/.claude-plugin/plugin.json > /dev/null
          # 2. Plugin scaffold must contain at minimum the specflow-auto skill
          # (catches an accidentally truncated plugin/ directory).
          test -f plugin/skills/specflow-auto/SKILL.md
          # 3. Hard fail if plugin.json version drifts from deno.json version.
          # The two are kept in lockstep by scripts/bump-version.ts.
          BIN_VERSION=$(jq -r .version deno.json)
          PLUGIN_VERSION=$(jq -r .version plugin/.claude-plugin/plugin.json)
          if [ "$BIN_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::plugin/.claude-plugin/plugin.json version ($PLUGIN_VERSION) does not match deno.json version ($BIN_VERSION). Re-run scripts/bump-version.ts."
            exit 1
          fi
          echo "✓ plugin manifest valid, scaffold present, version $PLUGIN_VERSION matches binary"
      - name: Cross-compile all targets
        run: deno run --allow-read --allow-write --allow-run --allow-env scripts/build.ts
      - name: Compute checksums
        run: |
          cd dist
          for f in specflow-*; do
            shasum -a 256 "$f" > "$f.sha256"
          done
      - name: Generate release notes
        run: deno run --allow-read --allow-write --allow-run scripts/gen-changelog.ts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/specflow-macos-x64
            dist/specflow-macos-x64.sha256
            dist/specflow-macos-arm64
            dist/specflow-macos-arm64.sha256
            dist/specflow-linux-x64
            dist/specflow-linux-x64.sha256
            dist/specflow-linux-arm64
            dist/specflow-linux-arm64.sha256
            dist/specflow-windows-x64.exe
            dist/specflow-windows-x64.exe.sha256
          body_path: dist/release-notes.md
      - name: Bump mkrlabs/homebrew-tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          deno run --allow-read --allow-write --allow-run --allow-env \
            scripts/bump-tap-formula.ts
