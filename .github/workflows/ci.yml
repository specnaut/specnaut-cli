name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format check
        run: deno task fmt:check
      - name: Lint
        run: deno task lint
      - name: Bundle templates
        run: deno task bundle
      - name: Type check
        run: deno task check
      - name: Test
        run: deno task test

  cross-smoke:
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Bundle + test on ${{ matrix.os }}
        shell: bash
        run: |
          deno task bundle
          deno task test
