<?xml version="1.0" encoding="UTF-8"?>
<!--
  Specflow composer icon for the Codex marketplace listing.
  Shown next to the plugin name in the Codex composer UI.

  Mark: three horizontal bars forming a structured outline (the spec
  taking shape, longest line in the middle for visual balance), with
  a peach accent dot trailing the most-detailed line — the active /
  next step in the flow. Color tokens follow DESIGN.md: brand-primary
  #5B6AF0 (indigo), brand-accent #F59E6C (warm peach). Square at 256
  with `rx=56` to match the Specflow brand surface treatment.

  Transitional placeholder. Replace with final brand artwork before
  the first Codex marketplace submission. The composition stays
  legible at 32x32, but does not yet carry the pixel-art sprite
  language called out in DESIGN.md.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  width="256"
  height="256"
  role="img"
  aria-label="Specflow"
>
  <rect width="256" height="256" rx="56" fill="#5B6AF0" />
  <rect x="64" y="80" width="80" height="20" rx="10" fill="#ffffff" />
  <rect x="64" y="118" width="128" height="20" rx="10" fill="#ffffff" />
  <rect x="64" y="156" width="96" height="20" rx="10" fill="#ffffff" />
  <circle cx="208" cy="128" r="16" fill="#F59E6C" />
</svg>
