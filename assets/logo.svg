<?xml version="1.0" encoding="UTF-8"?>
<!--
  Specnaut logo for the Codex marketplace gallery card.
  Square at 1024 (rasterise to 1024x1024 PNG for marketplaces that
  require PNG specifically; the Codex manifest references this SVG
  directly, so PNG is not generated by default).

  Mark: scaled-up version of `composer-icon.svg` — three horizontal
  bars + peach accent dot — paired with the "specnaut" wordmark and a
  short descriptor. Color tokens follow DESIGN.md: brand-primary
  #5B6AF0, brand-accent #F59E6C. DM Sans (with system fallback) is the
  wordmark face per DESIGN.md typography table.

  Transitional placeholder. Replace with final brand artwork before
  the first Codex marketplace submission. The wordmark is geometric
  sans, not the pixel-art treatment DESIGN.md eventually wants for
  hero use.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  width="1024"
  height="1024"
  role="img"
  aria-label="Specnaut"
>
  <rect width="1024" height="1024" rx="224" fill="#5B6AF0" />
  <rect x="288" y="232" width="320" height="64" rx="32" fill="#ffffff" />
  <rect x="288" y="332" width="512" height="64" rx="32" fill="#ffffff" />
  <rect x="288" y="432" width="384" height="64" rx="32" fill="#ffffff" />
  <circle cx="832" cy="364" r="56" fill="#F59E6C" />
  <text
    x="512"
    y="690"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'DM Sans', ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif"
    font-size="160"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-4"
  >specnaut</text>
  <text
    x="512"
    y="830"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'DM Sans', ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="500"
    fill="#ffffff"
    opacity="0.72"
  >spec-driven workflow</text>
</svg>
